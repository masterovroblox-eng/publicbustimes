name: Run tests

on:
  push:
  pull_request:

jobs:
  test-frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - run: npm install-ci-test
    - run: npm run lint
    - run: npm run build

  test-backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    container:
      image: ghcr.io/bustimes/bustimes.org/bustimes-base:3.14

    permissions:
      packages: read  # to use the bustimes-base docker image
      code-quality: write

    services:
      postgres:
        image: postgis/postgis:18-3.6

        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: "--no-sync"
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
          --health-start-period 5s
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - run: uv sync --group test --frozen && mkdir staticfiles

    - name: run tests
      env:
        DATABASE_URL: postgis://postgres:postgres@postgres/postgres
        SECRET_KEY: secret
      run: uv run coverage run --parallel-mode --concurrency=multiprocessing ./manage.py test --parallel=2 --keepdb --durations 10

    - name: generate coverage XML
      run: uv run coverage xml

    - name: Upload coverage report
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/upload-code-coverage@v1
      with:
        file: coverage.xml
        language: Python
        label: LABEL
