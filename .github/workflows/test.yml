name: Run tests

on:
  push:
  pull_request:

jobs:
  test-frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - run: npm install-ci-test
    - run: npm run lint
    - run: npm run build

  test-backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    container:
      image: ghcr.io/bustimes/bustimes.org/bustimes-base:3.14

    permissions:
      # Gives the action the necessary permissions for publishing new
      # comments in pull requests.
      pull-requests: write

      # Gives the action the necessary permissions for pushing data to the
      # python-coverage-comment-action branch, and for editing existing
      # comments (to avoid publishing multiple comments in the same PR)
      contents: write

      packages: read  # to use the bustimes-base docker image

    services:
      postgres:
        image: postgis/postgis:18-3.6

        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: "--no-sync"
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
          --health-start-period 5s
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v7

    - run: uv sync --group test --frozen && mkdir staticfiles

    - name: run tests
      env:
        DATABASE_URL: postgis://postgres:postgres@postgres/postgres
        SECRET_KEY: secret
      run: uv run coverage run --parallel-mode --concurrency=multiprocessing ./manage.py test --parallel=2 --keepdb --durations 10

    - name: generate coverage report
      run: uv run coverage combine

    - name: Coverage comment
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
